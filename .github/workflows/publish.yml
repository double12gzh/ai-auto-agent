name: Release

on:
    push:
        tags:
            - 'v*'

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Code Style Check (Lint)
              run: npm run lint

            - name: Type Check & Build
              run: npm run compile

            - name: Run Unit Tests
              run: xvfb-run -a npm run test

            - name: Extract version from tag
              id: version
              run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

            - name: Package Extension
              run: npx -y @vscode/vsce package --out ai-auto-agent-${{ steps.version.outputs.VERSION }}.vsix

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ai-auto-agent-vsix
                  path: '*.vsix'

            - name: Publish to VS Code Marketplace
              run: npx -y @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              continue-on-error: true

            - name: Publish to Open VSX Registry (Antigravity/Cursor/Windsurf)
              run: npx -y ovsx publish -p ${{ secrets.OVSX_PAT }}
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
              continue-on-error: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  name: AI Auto Agent ${{ github.ref_name }}
                  draft: false
                  files: '*.vsix'
                  generate_release_notes: true
