name: Test / CI

on:
    push:
        branches:
            - main
            - master
            - beta
            - release/*
    pull_request:
        branches:
            - main
            - master
            - beta
            - release/*

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Check Types & Lint
              run: |
                  npm run check-types
                  npm run lint

            - name: Run Unit Tests
              run: xvfb-run -a npm run test
