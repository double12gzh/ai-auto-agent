name: '✨ Feature Request / 功能建议'
description: 'Suggest a new feature or improvement for AI Auto Agent / 建议一个新功能或改进'
title: '[Feature]: '
labels: ['enhancement']
body:
    - type: markdown
      attributes:
          value: |
              Thank you for suggesting a feature! Please describe your request as clearly as possible.
              感谢你提出功能建议！请尽可能清晰地描述你的需求。

    - type: dropdown
      id: feature-area
      attributes:
          label: 功能领域 / Feature Area
          description: 这个功能建议属于哪个领域？ / Which area does this feature request belong to?
          options:
              - '自动重试逻辑 (Auto Retry Logic)'
              - '模型轮换策略 (Model Rotation Strategy)'
              - 'DOM 监控机制 (DOM Observer)'
              - 'UI / Dashboard 面板'
              - '配置选项 (Settings)'
              - '其他 (Other)'
      validations:
          required: true

    - type: textarea
      id: problem
      attributes:
          label: 你想解决什么问题？ / What problem do you want to solve?
          description: 清晰地描述你遇到的困难或不便 / Clearly describe the difficulties or inconveniences you encountered
          placeholder: '当我尝试 ... 时，需要 ... ，但现在只能 ... / When I try to ..., I need to ..., but right now I can only ...'
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: 你期望的解决方案 / Describe the solution you'd like
          description: 描述你希望的功能表现 / A clear and concise description of what you want to happen
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: 替代方案 / Describe alternatives you've considered
          description: 你是否考虑过其他替代方案？ / A clear and concise description of any alternative solutions or features you've considered.
      validations:
          required: false

    - type: textarea
      id: additional-context
      attributes:
          label: 补充信息 / Additional context
          description: 其他有助于理解需求的信息（截图、参考链接、使用场景等） / Add any other context or screenshots about the feature request here.
      validations:
          required: false
